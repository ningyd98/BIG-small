name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff format check
        run: python -m ruff format --check .

      - name: Ruff lint
        run: python -m ruff check .

      - name: MyPy
        run: python -m mypy .

      - name: Pytest
        run: python -m pytest -q

      - name: Validate contract examples
        run: python scripts/validate_contract_examples.py

      - name: Run fixed pick-place demo
        run: python scripts/run_fixed_pick_place.py --adapter mock

      - name: Run fixed pick-place repeat
        run: python scripts/run_fixed_pick_place.py --adapter mock --repeat 20

      - name: Run fault injection suite
        run: python scripts/run_fault_injection_suite.py

      - name: Run Phase 2 task runtime
        run: python scripts/run_phase2_task.py --repository sqlite

      - name: Run Phase 2 failure case
        run: python scripts/run_phase2_failure_case.py --fault GRASP_FAILED

      - name: Run Phase 2 replay test
        run: python scripts/run_phase2_replay_test.py

      - name: Run Phase 2 restart recovery test
        run: python scripts/run_phase2_restart_recovery_test.py

      - name: Verify Phase 2
        run: python scripts/verify_phase2.py

      - name: Run Phase 3 safe task
        run: python scripts/run_phase3_safe_task.py

      - name: Run Phase 3 workspace violation
        run: python scripts/run_phase3_workspace_violation.py

      - name: Run Phase 3 collision case
        run: python scripts/run_phase3_collision_case.py

      - name: Run Phase 3 obstacle case
        run: python scripts/run_phase3_obstacle_case.py

      - name: Run Phase 3 stale scene case
        run: python scripts/run_phase3_stale_scene_case.py

      - name: Run Phase 3 watchdog timeout
        run: python scripts/run_phase3_watchdog_timeout.py

      - name: Verify Phase 3
        run: python scripts/verify_phase3.py

      - name: Verify Phase 3.1
        run: python scripts/verify_phase3_1.py
