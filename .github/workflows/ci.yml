# CI 说明：默认流水线只运行软件、仿真和 fake Level 0 验证，不连接真实控制器。
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_mujoco_runtime:
        description: "Run optional Phase 11.1 MuJoCo runtime acceptance on a prepared runner"
        required: false
        type: boolean
        default: false

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,sim-mujoco]"

      - name: Compile check
        run: python -m compileall src scripts tests

      - name: Format check
        run: python -m ruff format --check .

      - name: Lint
        run: python -m ruff check .

      - name: Type check
        run: python -m mypy .

      - name: Unit tests
        run: python -m pytest -q

      - name: Documentation consistency
        run: python scripts/check_docs.py

      - name: Thesis and LLM-only merge gates
        run: |
          python scripts/check_model_control_secrets.py
          python scripts/check_chinese_comments.py
          python scripts/run_llm_only_baseline.py --profile smoke --provider fake
          python scripts/analyze_llm_only_baseline.py
          python scripts/verify_llm_only_baseline.py
          python scripts/export_llm_comparison_tables.py
          python scripts/build_thesis_evidence.py
          python scripts/build_thesis_tables.py
          python scripts/build_thesis_figures.py
          python scripts/verify_thesis_references.py
          python scripts/build_thesis.py
          python scripts/check_thesis_figures.py
          python scripts/check_thesis_claims.py

      - name: Phase 3 verification
        run: |
          python scripts/verify_phase3.py
          python scripts/verify_phase3_1.py
          python scripts/verify_phase3_2.py

      - name: Phase 4 verification
        run: python scripts/verify_phase4.py

      - name: Phase 5 verification
        run: python scripts/verify_phase5.py

      - name: Phase 6 verification
        run: python scripts/verify_phase6.py

      - name: Phase 6.2 verification
        run: python scripts/verify_phase6_2.py

      - name: Phase 7 verification
        run: python scripts/verify_phase7.py

      - name: Phase 8 smoke verification
        run: python scripts/verify_phase8.py

      - name: Phase 8.1 verification
        run: python scripts/verify_phase8_1.py

      - name: Phase 8.2 verification
        run: python scripts/verify_phase8_2.py

      - name: Phase 9 MuJoCo verification
        run: |
          python scripts/verify_phase9_mujoco.py
          python scripts/verify_phase9_randomization.py
          python scripts/verify_phase9_artifacts.py

      - name: Phase 9.1 blocked-environment guard
        run: python scripts/verify_phase9_1.py --skip-history

      - name: Project CI profile
        run: python scripts/verify_project.py --profile ci

      - name: Phase 10 software-side checks
        run: |
          python scripts/verify_phase10_0.py
          python scripts/verify_phase10_1.py
          python scripts/verify_phase10_2a.py --skip-runtime

      - name: Phase 10.2B backend-only dashboard verification
        run: python scripts/verify_phase10_2b.py --backend-only

      - name: Phase 10.2C Level 0 framework verification
        run: python scripts/verify_phase10_2c_level0.py --fake

      - name: Phase 12 smoke evaluation
        run: |
          python scripts/run_phase12_experiments.py --profile smoke --output artifacts/phase12
          python scripts/analyze_phase12_results.py --profile smoke --output artifacts/phase12
          python scripts/export_phase12_thesis_assets.py --profile smoke --output artifacts/phase12
          python scripts/verify_phase12.py --smoke --output artifacts/phase12/verification --artifact-root artifacts/phase12

      - name: Upload Phase 12 smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase12-smoke-artifacts
          path: artifacts/phase12
          if-no-files-found: ignore

      - name: Dependency check
        run: python -m pip check

  frontend:
    runs-on: ubuntu-latest
    needs: python

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,sim-mujoco]"

      - name: Dashboard frontend checks
        working-directory: dashboard
        run: |
          npm ci
          npm run api:check
          npm run format:check
          npm run lint
          npm run typecheck
          npm run test
          npm run build

      - name: Phase 11 simulation workbench partial verification
        run: python scripts/verify_phase11_simulation_workbench.py --skip-e2e

  e2e:
    runs-on: ubuntu-latest
    needs: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,sim-mujoco]"
          cd dashboard
          npm ci
          npx playwright install --with-deps chromium

      - name: Run dashboard Playwright E2E
        working-directory: dashboard
        env:
          DASHBOARD_AUTH_MODE: LOCAL_ONLY
          DASHBOARD_EXPERIMENT_WRITES_ENABLED: "true"
        run: npm run e2e

      - name: Phase 11.1 simulation runtime CI verification
        env:
          DASHBOARD_AUTH_MODE: LOCAL_ONLY
          DASHBOARD_EXPERIMENT_WRITES_ENABLED: "true"
        run: python scripts/verify_phase11_1_simulation_runtime.py --ci

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-playwright-report
          path: |
            dashboard/playwright-report
            dashboard/test-results
          if-no-files-found: ignore

      - name: Upload Phase 11.1 CI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase11-1-runtime-ci-artifacts
          path: artifacts/phase11_1
          if-no-files-found: ignore

  simulation-mujoco-runtime:
    runs-on: self-hosted
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_mujoco_runtime }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,sim-mujoco]"

      - name: Phase 11.1 MuJoCo runtime acceptance
        run: python scripts/verify_phase11_1_simulation_runtime.py --mujoco

      - name: Upload MuJoCo runtime artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase11-1-mujoco-runtime-artifacts
          path: artifacts/phase11_1
          if-no-files-found: ignore
