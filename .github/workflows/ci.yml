name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Compile check
        run: python -m compileall src scripts tests

      - name: Format check
        run: python -m ruff format --check .

      - name: Lint
        run: python -m ruff check .

      - name: Type check
        run: python -m mypy .

      - name: Unit tests
        run: python -m pytest -q

      - name: Phase 3 verification
        run: |
          python scripts/verify_phase3.py
          python scripts/verify_phase3_1.py
          python scripts/verify_phase3_2.py

      - name: Phase 4 verification
        run: python scripts/verify_phase4.py

      - name: Phase 5 verification
        run: python scripts/verify_phase5.py

      - name: Phase 6 verification
        run: python scripts/verify_phase6.py

      - name: Phase 6.2 verification
        run: python scripts/verify_phase6_2.py

      - name: Dependency check
        run: python -m pip check
