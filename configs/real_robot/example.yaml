# 真机配置示例仅供站点外复制改写，仓库内占位值不得用于连接真实控制器。
# Phase 10 real robot configuration template.
# This file is intentionally invalid for execution until every placeholder is
# replaced by site-specific values under local operator control.
robot_vendor: REPLACE_WITH_VENDOR
robot_model: REPLACE_WITH_MODEL
robot_serial: REPLACE_WITH_SITE_SERIAL
controller_address: REPLACE_WITH_CONTROLLER_HOSTNAME_OR_ADDRESS
ros_namespace: /real_robot
planning_group: panda_arm
end_effector_link: panda_hand
base_link: panda_link0
joint_names:
  - panda_joint1
  - panda_joint2
  - panda_joint3
  - panda_joint4
  - panda_joint5
  - panda_joint6
  - panda_joint7
velocity_scale: 0.05
