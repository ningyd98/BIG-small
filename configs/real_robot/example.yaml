  x_min: -0.30
  x_max: 0.30
  y_min: -0.30
  y_max: 0.30
  z_min: 0.05
  z_max: 0.45
payload_limit_kg: 0.20
emergency_stop_topic: /real_robot/emergency_stop
hardware_status_topic: /real_robot/hardware_status
