# 默认安全策略配置，提供仿真和任务校验阈值，本文件本身不授权硬件运动。
hard_limits:
  max_tcp_velocity: 1.0
  max_joint_velocity: 2.0
  max_acceleration: 5.0
  minimum_safe_height: 0.08
  workspace_x_min: -0.5
  workspace_x_max: 0.5
  workspace_y_min: -0.5
  workspace_y_max: 0.5
  workspace_z_min: 0.0
  workspace_z_max: 0.6
  max_reach_m: 0.65
  obstacle_safety_distance: 0.05
  carry_safety_margin: 0.02
  step_timeout_safety_margin_ms: 200
  task_deadline_safety_margin_ms: 500
  scene_staleness_ms: 5000
  telemetry_staleness_ms: 5000
  command_ttl_ms: 10000
  watchdog_timeout_ms: 30000
  low_height_exception_skills:
    - APPROACH
    - GRASP
    - PLACE
    - RELEASE

operational_policy:
  policy_version: "1.0.0"
  max_tcp_velocity: 0.5
  max_joint_velocity: 1.0
  max_acceleration: 3.0
  minimum_safe_height: 0.08
  max_reach_m: 0.65
  obstacle_safety_distance: 0.05
  carry_safety_margin: 0.02
  step_timeout_safety_margin_ms: 200
  task_deadline_safety_margin_ms: 500
  scene_staleness_ms: 5000
  telemetry_staleness_ms: 5000
  command_ttl_ms: 10000
  watchdog_timeout_ms: 30000
  low_height_exception_skills:
    - APPROACH
    - GRASP
    - PLACE
    - RELEASE
