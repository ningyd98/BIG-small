# 测试安全策略配置仅用于自动化测试覆盖，不代表生产或真实硬件验收阈值。
hard_limits:
  max_tcp_velocity: 2.0
  max_joint_velocity: 5.0
  max_acceleration: 10.0
  minimum_safe_height: 0.05
  workspace_x_min: -1.0
  workspace_x_max: 1.0
  workspace_y_min: -1.0
  workspace_y_max: 1.0
  workspace_z_min: 0.0
  workspace_z_max: 1.0
  max_reach_m: 1.5
  obstacle_safety_distance: 0.02
  carry_safety_margin: 0.01
  step_timeout_safety_margin_ms: 100
  task_deadline_safety_margin_ms: 200
  scene_staleness_ms: 10000
  telemetry_staleness_ms: 10000
  command_ttl_ms: 30000
  watchdog_timeout_ms: 60000
