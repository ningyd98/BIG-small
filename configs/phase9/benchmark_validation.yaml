# Phase 9 验证基准配置，覆盖多场景多模式 MuJoCo 仿真，不作为真实机械臂验收输入。
suite: phase9_validation_mujoco
backend: mujoco
scenarios: [S01_NORMAL_STATIC, S02_TARGET_MOVED, S03_OBSTACLE_INSERTED, S04_GRASP_FAILURE, S05_TARGET_LOST, S06_PERCEPTION_DEGRADED, S07_NETWORK_DEGRADED, S08_NETWORK_OUTAGE, S09_CLOUD_UNAVAILABLE, S10_STALE_DUPLICATE_REORDERED_COMMAND, S11_SKILL_CACHE_HIT, S12_SKILL_CACHE_QUARANTINE, S13_MODE_OSCILLATION_PRESSURE, S14_EMERGENCY_STOP, S15_SQLITE_RESTART_DURING_RUN, S16_PAYLOAD_MASS_VARIATION, S17_CONTACT_FRICTION_VARIATION, S18_ACTUATOR_DELAY_AND_JITTER, S19_CAMERA_NOISE_AND_OCCLUSION, S20_CAMERA_EXTRINSIC_DRIFT, S21_OBJECT_SLIP_AFTER_LIFT, S22_COLLISION_NEAR_MISS, S23_UNREACHABLE_OR_JOINT_LIMIT_TARGET, S24_PHYSICS_TIMESTEP_AND_SENSOR_SKEW, S25_ROS2_BRIDGE_RESTART]
modes: [PCSC, ETEAC, AUTO]
seeds: [0, 1, 2, 3, 4]
networks: [GOOD, DEGRADED, INTERMITTENT]
randomization_levels: [NONE, MODERATE]
