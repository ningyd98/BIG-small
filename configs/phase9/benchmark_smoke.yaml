# Phase 9 冒烟基准配置，用少量 MuJoCo 场景快速检查仿真链路，不授权硬件动作。
suite: phase9_smoke
backend: mujoco
scenarios: [S01_NORMAL_STATIC, S02_TARGET_MOVED, S04_GRASP_FAILURE, S14_EMERGENCY_STOP, S21_OBJECT_SLIP_AFTER_LIFT, S23_UNREACHABLE_OR_JOINT_LIMIT_TARGET]
modes: [PCSC, ETEAC, AUTO]
seeds: [0]
networks: [NORMAL]
randomization_levels: [NONE]
