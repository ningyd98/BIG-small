# Phase 9 域随机化配置，描述仿真扰动范围，用于鲁棒性评估而非硬件写操作。
version: phase9.dr.v1
levels:
  NONE:
    scale: 0.0
  MILD:
    scale: 0.25
  MODERATE:
    scale: 0.55
  SEVERE:
    scale: 1.0
parameters:
  object_mass_kg:
    unit: kg
    nominal: 0.08
    min: 0.04
    max: 0.28
  friction_coefficient:
    unit: coefficient
    nominal: 0.8
    min: 0.08
    max: 1.2
  actuator_delay_ms:
    unit: ms
    nominal: 0
    min: 0
    max: 120
  camera_depth_noise_m:
    unit: m
    nominal: 0.002
    min: 0
    max: 0.035
