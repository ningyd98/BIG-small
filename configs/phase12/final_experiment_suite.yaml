# Phase 12 最终实验配置：只定义软件、仿真和 dry-run 实验矩阵，不包含真实硬件 runner。
schema_version: phase12.final_experiment_suite.v1
profiles:
  smoke:
    seeds: [0]
    repetitions: 1
    purpose: 快速验证 Phase 12 管线和安全边界，不产生最终论文统计结论。
  validation:
    seed_count: 3
    repetitions: 2
    purpose: 验证多 seed 聚合、统计、图表和表格生成。
  full:
    baseline_seed_count: 30
    network_seed_count: 20
    fault_seed_count: 20
    paired_backend_seed_count: 20
    planner_provider_seed_count: 20
    stress_task_count: 100
    repetitions: 3
    purpose: 资源允许时生成论文最终统计结论。
hardware_claims:
  real_controller_contacted: false
  hardware_motion_observed: false
  hardware_write_operations: []
  highest_real_hardware_acceptance_level: NONE
allowed_runner_kinds:
  - PHASE8_EXPERIMENT_RUNNER
  - PHASE9_MUJOCO
  - PHASE9_2_ISAAC
  - PHASE10_SYNTHETIC_DRY_RUN
  - PHASE10_MOVEIT_RUNTIME_DRY_RUN
  - PHASE11_SIMULATION_RUNTIME
  - PHASE11_2_PLANNER_DRY_RUN
experiments:
  # 实验说明：F01-F20 的权威字段由 final_evaluation.registry 维护，此处记录配置版本和审计入口。
  registry_source: cloud_edge_robot_arm.final_evaluation.registry.final_experiment_registry
  count: 20
  status_if_environment_missing: BLOCKED_BY_ENV
