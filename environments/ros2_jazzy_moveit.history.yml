# 环境说明：该 Conda 历史文件记录 ROS 2 Jazzy / MoveIt 仿真依赖，不启动真实硬件驱动。
name: bigsmall-ros2-jazzy-moveit
channels:
  - robostack-jazzy
  - conda-forge
  - defaults
dependencies:
  - colcon-common-extensions
  - python=3.12
  - ros-jazzy-moveit
  - ros-jazzy-moveit-resources-panda-moveit-config
  - ros-jazzy-rmw-fastrtps-cpp
  - ros-jazzy-ros-base
  - rosdep
  - vcstool
  - filelock
  - ros-jazzy-joint-state-broadcaster
  - ros-jazzy-joint-trajectory-controller
